<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Visualizer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Apple-Style Glassmorphism Button */
        #startBtn {
            position: relative;
            z-index: 10;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 500;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(15px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5), inset 0 0 10px rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            letter-spacing: 0.5px;
        }

        #startBtn:hover {
            transform: scale(1.05) translateY(-2px);
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 40px rgba(255, 255, 255, 0.1);
        }

        #startBtn:active {
            transform: scale(0.98);
        }

        /* Fullscreen Button */
        #fullscreenBtn {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 10;
            display: none;
            padding: 12px 16px;
            font-size: 20px;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(15px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            opacity: 0;
            width: 50px;
            height: 50px;
            align-items: center;
            justify-content: center;
        }

        #fullscreenBtn.active {
            display: flex;
        }

        #fullscreenBtn.visible {
            opacity: 1;
        }

        #fullscreenBtn:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 6px 35px rgba(255, 255, 255, 0.15);
        }

        #fullscreenBtn:active {
            transform: scale(0.95);
        }

        /* Hover Area for Fullscreen Button */
        #fullscreenHoverArea {
            position: fixed;
            top: 0;
            right: 0;
            width: 150px;
            height: 150px;
            z-index: 9;
            display: none;
        }

        #fullscreenHoverArea.active {
            display: block;
        }

        /* Hover Area - invisible larger area to detect mouse */
        #controlsHoverArea {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 150px;
            z-index: 9;
            display: none;
        }

        #controlsHoverArea.active {
            display: block;
        }

        /* Controls Container */
        #controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: none;
            gap: 15px;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #controls.active {
            display: flex;
        }

        #controls.visible {
            opacity: 1;
        }

        /* Navigation Buttons */
        .nav-btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 500;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(15px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .nav-btn:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 6px 35px rgba(255, 255, 255, 0.15);
        }

        .nav-btn:active {
            transform: scale(0.95);
        }

        /* Animation Name Display */
        #animationName {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            backdrop-filter: blur(15px);
            min-width: 150px;
            text-align: center;
        }
    </style>
</head>
<body>

    <button id="startBtn">Start Audio Vibe</button>
    <canvas id="visualizer"></canvas>

    <div id="fullscreenHoverArea"></div>
    <button id="fullscreenBtn" title="Vollbild">⛶</button>

    <div id="controlsHoverArea"></div>
    <div id="controls">
        <button class="nav-btn" id="prevBtn">◀ Back</button>
        <div id="animationName">Animation 1</div>
        <button class="nav-btn" id="nextBtn">Next ▶</button>
    </div>

    <script type="module" src="src/script.js"></script>
</body>
</html>
